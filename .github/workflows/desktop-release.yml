# ============================================================
# World Monitor Desktop — Cross-Platform Release Build
# ============================================================
# Triggers on version tags (v*) or manual dispatch.
# Builds Tauri desktop app for Windows, macOS (Intel + ARM), Linux.
# Uploads installers as GitHub Release assets.
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY  — (optional) Tauri updater signing key
#   TAURI_KEY_PASSWORD          — (optional) Signing key password
# ============================================================

name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      variant:
        description: 'App variant to build'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - tech
          - finance
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_DESKTOP_RUNTIME: '1'
  VITE_VARIANT: ${{ github.event.inputs.variant || 'full' }}
  NODE_VERSION: '20'
  RUST_BACKTRACE: 1

jobs:
  # ── Build matrix: Windows, macOS (Intel + ARM), Linux ──
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
            ext: '.exe,.msi'
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS-Intel
            ext: '.dmg'
          - platform: macos-14
            target: aarch64-apple-darwin
            label: macOS-ARM
            ext: '.dmg'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux
            ext: '.AppImage,.deb'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── Rust ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # ── Linux dependencies ──
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Install npm dependencies ──
      - name: Install dependencies
        run: npm ci

      # ── Version sync ──
      - name: Sync desktop version
        run: npm run version:sync

      # ── Build frontend ──
      - name: Build frontend
        run: npm run build:desktop
        env:
          VITE_VARIANT: ${{ env.VITE_VARIANT }}
          VITE_DESKTOP_RUNTIME: '1'

      # ── Build Tauri app ──
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'World Monitor ${{ github.ref_name }}'
          releaseBody: |
            ## World Monitor Desktop ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |---|---|
            | 🪟 **Windows** | `.exe` (NSIS installer) or `.msi` |
            | 🍎 **macOS Intel** | `.dmg` |
            | 🍎 **macOS Apple Silicon** | `.dmg` |
            | 🐧 **Linux** | `.AppImage` or `.deb` |

            ### What's Included

            - 🌍 **Full Dashboard** — 35+ real-time data layers, 54-country CII
            - 🤖 **AI Agent** — Built-in chat with Ollama (local) / Groq / OpenRouter
            - 🔒 **Local API Keys** — Secure native key storage (no cloud)
            - 🗺️ **Offline Maps** — Cached tile support for offline use
            - ⚡ **Native Performance** — Tauri v2, WebView2/WebKit

            ### System Requirements

            - **Windows**: Windows 10 (1803+) with WebView2
            - **macOS**: macOS 11+ (Big Sur)
            - **Linux**: WebKitGTK 4.1+, glibc 2.31+
          releaseDraft: ${{ github.event.inputs.draft || true }}
          prerelease: false
          args: --target ${{ matrix.target }}

      # ── Upload build artifacts (backup) ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          retention-days: 7
          if-no-files-found: ignore

  # ── Summary job ──
  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build summary
        run: |
          echo "## 🖥️ Desktop Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Intel | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS ARM | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Variant: **${{ env.VITE_VARIANT }}**" >> $GITHUB_STEP_SUMMARY
